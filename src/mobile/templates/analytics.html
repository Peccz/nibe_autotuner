{% extends "base.html" %}
{% set active_page = 'analytics' %}

{% block content %}
<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>📊 Analys</h2>
        <select class="form-select w-auto bg-dark text-white border-secondary" id="time-range" onchange="loadCharts()">
            <option value="24">24h</option>
            <option value="48">48h</option>
            <option value="72">3 dygn</option>
            <option value="168">1 vecka</option>
        </select>
    </div>

    <!-- Main Chart -->
    <div class="card bg-dark text-white mb-4">
        <div class="card-header d-flex justify-content-between">
            <span>Temperaturer & Delta T</span>
            <small class="text-muted"><i class="bi bi-circle-fill text-primary"></i> Inne <i class="bi bi-circle-fill text-danger"></i> Fram <i class="bi bi-circle-fill text-success"></i> Ute <i class="bi bi-circle-fill" style="color:#a855f7"></i> Delta T</small>
        </div>
        <div class="card-body">
            <div style="height: 350px;">
                <canvas id="tempChart"></canvas>
            </div>
        </div>
    </div>

    <!-- COP & Compressor -->
    <div class="row">
        <div class="col-md-6">
            <div class="card bg-dark text-white mb-4">
                <div class="card-header">
                    Kompressorfrekvens
                </div>
                <div class="card-body">
                    <div style="height: 200px;">
                        <canvas id="compChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card bg-dark text-white mb-4">
                <div class="card-header">
                    COP (Estimerad)
                </div>
                <div class="card-body">
                    <div style="height: 200px;">
                        <canvas id="copChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let charts = {};

    async function loadCharts() {
        const hours = document.getElementById('time-range').value;
        
        try {
            // Load data
            const [indoor, outdoor, supply, deltaT, comp, cop] = await Promise.all([
                fetch(`/api/chart/indoor?hours=${hours}`).then(r => r.json()).catch(e => ({success: false, error: e})),
                fetch(`/api/chart/outdoor?hours=${hours}`).then(r => r.json()).catch(e => ({success: false, error: e})),
                fetch(`/api/chart/supply?hours=${hours}`).then(r => r.json()).catch(e => ({success: false, error: e})),
                fetch(`/api/chart/delta_t?hours=${hours}`).then(r => r.json()).catch(e => ({success: false, error: e})),
                fetch(`/api/chart/compressor?hours=${hours}`).then(r => r.json()).catch(e => ({success: false, error: e})),
                fetch(`/api/chart/cop?hours=${hours}`).then(r => r.json()).catch(e => ({success: false, error: e}))
            ]);

            console.log("Charts Data Loaded:", {indoor, outdoor, supply, deltaT, comp, cop});

            // Temperature Chart - Build dynamically
            const tempDatasets = [];
            let tempLabels = [];

            // 1. Innetemperatur (Huvudfokus)
            if (indoor?.success && indoor.data?.values && indoor.data.values.length > 0) {
                tempDatasets.push({ 
                    label: 'Inne (°C)', 
                    data: indoor.data.values, 
                    borderColor: '#3b82f6', 
                    borderWidth: 3,
                    tension: 0.4,
                    pointRadius: 0
                });
                tempLabels = indoor.data.labels;
            }

            // 2. Framledning
            if (supply?.success && supply.data?.values && supply.data.values.length > 0) {
                tempDatasets.push({ 
                    label: 'Framledning', 
                    data: supply.data.values, 
                    borderColor: '#ef4444', 
                    borderWidth: 2,
                    borderDash: [5, 5],
                    tension: 0.4,
                    pointRadius: 0
                });
                if (!tempLabels.length) tempLabels = supply.data.labels;
            }

            // 3. Delta T (Ifylld yta)
            if (deltaT?.success && deltaT.data?.values && deltaT.data.values.length > 0) {
                tempDatasets.push({ 
                    label: 'Delta T', 
                    data: deltaT.data.values, 
                    borderColor: '#a855f7', 
                    backgroundColor: 'rgba(168, 85, 247, 0.1)', 
                    borderWidth: 1,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                });
                if (!tempLabels.length) tempLabels = deltaT.data.labels;
            }

            // 4. Utetemperatur
            if (outdoor?.success && outdoor.data?.values && outdoor.data.values.length > 0) {
                tempDatasets.push({ 
                    label: 'Ute', 
                    data: outdoor.data.values, 
                    borderColor: '#10b981', 
                    borderWidth: 2,
                    tension: 0.4,
                    pointRadius: 0
                });
                if (!tempLabels.length) tempLabels = outdoor.data.labels;
            }

            if (tempDatasets.length > 0) {
                renderChart('tempChart', tempDatasets, tempLabels);
            } else {
                console.warn("No temperature data available to render");
            }

            // Compressor Chart
            if (comp?.success && comp.data?.values && comp.data.values.length > 0) {
                renderChart('compChart', [
                    { label: 'Kompressor (Hz)', data: comp.data.values, borderColor: '#8b5cf6', backgroundColor: 'rgba(139, 92, 246, 0.1)', fill: true, tension: 0.4, pointRadius: 0 }
                ], comp.data.labels);
            }

            // COP Chart
            if (cop?.success && cop.data?.values && cop.data.values.length > 0) {
                renderChart('copChart', [
                    { label: 'COP', data: cop.data.values, borderColor: '#f59e0b', tension: 0.4, pointRadius: 0 }
                ], cop.data.labels);
            }
            
        } catch (e) {
            console.error("Failed to load charts logic:", e);
        }
    }

    function renderChart(canvasId, datasets, labels) {
        const ctx = document.getElementById(canvasId).getContext('2d');
        
        if (charts[canvasId]) charts[canvasId].destroy();

        if (!labels) labels = [];

        // Simple downsampling if too many points to avoid sluggishness
        let finalLabels = labels;
        let finalDatasets = datasets;

        const formattedLabels = finalLabels.map(t => {
            try {
                return new Date(t).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } catch (e) {
                return t;
            }
        });

        charts[canvasId] = new Chart(ctx, {
            type: 'line',
            data: { 
                labels: formattedLabels, 
                datasets: finalDatasets 
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#e5e7eb', usePointStyle: true } },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(0,0,0,0.8)',
                        titleColor: '#fff',
                        bodyColor: '#fff',
                        borderColor: 'rgba(255,255,255,0.1)',
                        borderWidth: 1
                    }
                },
                scales: {
                    x: { 
                        ticks: { maxTicksLimit: 8, color: '#9ca3af' }, 
                        grid: { color: 'rgba(255,255,255,0.05)' } 
                    },
                    y: { 
                        ticks: { color: '#9ca3af' },
                        grid: { color: 'rgba(255,255,255,0.05)' } 
                    }
                }
            }
        });
    }

    loadCharts();
</script>
{% endblock %}
